services:

  nginx:
    image: nginx:1.25.0
    labels:
      - bt.watch=true

  traefik1:
    image: traefik:3.0.0
    labels:
      - bt.watch=true
      - bt.tag.include=^\d+\.\d+.\d+$$
      - bt.trigger.include=ntfy.one
      - bt.display.icon=sh-plex

  traefik2:
    image: traefik:3.0.0
    labels:
      - bt.watch=true
      - bt.tag.include=^\d+\.\d+.\d+$$
      - bt.trigger.exclude=ntfy.two
      - bt.display.icon=hl-plex
